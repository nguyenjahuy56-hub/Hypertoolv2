<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TX POPCOUNT Engine</title>
    <style>
        :root {
            --bg: #050505;
            --surface: #121212;
            --cyan: #06b6d4;
            --tai: #f43f5e;
            --xiu: #10b981;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Space Mono', monospace;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .terminal {
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.05);
            width: 100%;
            max-width: 520px;
            border: 1px solid #262626;
            border-top: 3px solid var(--cyan);
        }

        h1 {
            text-align: center;
            color: var(--cyan);
            font-size: 1.2rem;
            margin-top: 0;
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
        }

        textarea {
            width: 100%;
            height: 80px;
            background-color: #000;
            border: 1px solid #333;
            padding: 1rem;
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            resize: none;
            box-sizing: border-box;
            outline: none;
            margin-top: 1rem;
        }

        textarea:focus {
            border-color: var(--cyan);
        }

        button {
            width: 100%;
            margin-top: 1rem;
            padding: 1rem;
            border: none;
            background-color: var(--cyan);
            color: #000;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
        }

        button:active {
            transform: translateY(2px);
        }

        #output {
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #000;
            display: none;
            border: 1px solid #333;
        }

        .result-box {
            text-align: center;
        }

        .pred-text {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: 4px;
            font-family: system-ui, -apple-system, sans-serif;
        }

        .tai-style { color: var(--tai); text-shadow: 0 0 20px rgba(244, 63, 94, 0.5); }
        .xiu-style { color: var(--xiu); text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
    </style>
</head>
<body>

<div class="terminal">
    <h1>>_ POPCOUNT ENGINE</h1>
    
    <textarea id="hashInput" placeholder="Dán mã Hash vào đây..." autocomplete="off"></textarea>
    <button onclick="calcLogic()">PHÂN TÍCH</button>

    <div id="output">
        <div class="result-box">
            <div style="font-size: 0.7rem; color: #52525b; letter-spacing: 2px; margin-bottom: 5px;">KẾT QUẢ DỰ ĐOÁN</div>
            <div id="prediction" class="pred-text">--</div>
        </div>
    </div>
</div>

<script>
    function calcLogic() {
        const hash = document.getElementById('hashInput').value.trim();
        
        if (hash.length < 61) {
            alert("Hash quá ngắn! Cần tối thiểu 61 ký tự.");
            return;
        }

        // Thuật toán Popcount trên đoạn [15:61]
        const segment = hash.substring(15, 61);
        let popcount = 0;
        for (let k = 0; k < segment.length; k++) {
            let charCode = segment.charCodeAt(k);
            while (charCode > 0) {
                popcount += charCode & 1;
                charCode >>= 1;
            }
        }

        const mod = popcount % 5;
        const isTai = mod <= 2; 
        
        document.getElementById('output').style.display = 'block';
        const predDiv = document.getElementById('prediction');

        if (isTai) {
            predDiv.innerText = "TÀI";
            predDiv.className = "pred-text tai-style";
        } else {
            predDiv.innerText = "XỈU";
            predDiv.className = "pred-text xiu-style";
        }
    }

    document.getElementById('hashInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            calcLogic();
        }
    });
</script>

</body>
</html>
